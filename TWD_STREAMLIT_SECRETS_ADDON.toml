# Add these two lines to the TWD Streamlit app's existing Secrets.
# Replace the value with a new password. Do not commit an actual password to Git.
QAV_DUE_DATE_PASSWORD = "replace-with-a-new-strong-password"
EXTENSION_REQUESTS_TABLE = "twd_due_date_extension_requests"
# Server-only key. It is required because the extension-request table is deliberately not public.
SUPABASE_SERVICE_ROLE_KEY = "replace-with-your-supabase-service-role-key"
# Power Automate「When an HTTP request is received」產生的回呼網址。
EXCEL_UPDATE_WEBHOOK = "https://replace-with-your-power-automate-webhook"
